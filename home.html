<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>GitHub Issues Tracker | Home </title>
    <!-- daisyui + tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font-awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        *{
          font-family: "Geist", sans-serif;  
        }
    </style>

</head>
<body class="bg-[#F8FAFC] ">
    <header class="bg-base-100 flex items-center justify-between px-20 py-4 shadow-md">
        <div class="logo-container flex items-center ">
            <div class="logo">
                <img class="w-[36px]" src="./assets/github-logo.png" alt="github logo image">

            </div>
            <div class="content">
                <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>


            </div>

        </div>
        <div class="search">
            <div class="join">
                <div>
                 <label class="input validator join-item rounded-md text-gray-600">
                    <i class="fa-brands fa-sistrix"></i>
      
                <input  type="text" placeholder=" Search Isuues..." required />
                </label>
    
            </div>
           <div class="ml-4">
            <button class="btn btn-primary rounded-md"><i class="fa-solid fa-plus"></i> New Issue</button>
           </div>
        </div>
    </header>

    <main class="w-11/12 mx-auto mt-14" >
        <section class="bg-base-100 rounded-lg p-6 space-x-2 shadow-md">
            <button onclick="activeBtn('all')" id="btn-all" class="btn btn-soft  ">All</button>
            <button onclick="activeBtn('open')" id="btn-open" class="btn btn-soft  ">Open</button>
            <button onclick="activeBtn('closed')" id="btn-closed" class="btn btn-soft  ">Closed</button>

        </section>

        <section class="bg-base-100 rounded-lg p-6 shadow-md mt-4 flex justify-between">
            <div class="flex gap-4">
                <div class="rounded-full bg-[#ECE4FF] p-3">
                    <img class="h-full" src="./assets/Aperture.png" alt="Aperture image">
                </div>
                <div>
                    <h2 class="text-xl font-semibold text-[#1F2937]"> <span id="cardCount">50</span> Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-8 font-medium ">
                <button class="btn "><li class="marker:text-green-400">Open</li></button>
                <button class="btn "><li class="marker:text-purple-400">Closed</li></button>
            </div>

        </section>

        <section id="parent-container">
            <section id="loading" class="flex justify-center items-center py-10 hidden">
           <span class="loading loading-spinner loading-xl"></span> 
        </section>
       
            <section id="issue-container" class=".hidden mt-6 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4  gap-3 item- ">
            
           </section>
        <!-- open section -->
         <section id="open-container" class=".hidden mt-6 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4  gap-3 ">
            
        </section>
        <!-- closed section -->
         <section id="closed-container" class=".hidden   mt-6 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4  gap-3">
            
        </section>
        </section>

        
       
    </main>

     <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <div id="issue-info-container">

    </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>


    <script src="./home.js"></script>
</body>
</html>
