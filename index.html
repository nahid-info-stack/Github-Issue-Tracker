<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>GitHub Issues Tracker | Sing In </title>
    <!-- daisyui + tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font-awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        *{
          font-family: "Geist", sans-serif;  
        }
    </style>

</head>
<body class="bg-[#F8FAFC] py-20">
    <section class="max-w-[520px] bg-base-100 mx-auto shadow-md border border-gray-300 p-8 rounded-lg">
        <div class="space-y-6">
            <div class="logo w-24 mx-auto ">
                <img class="" src="./assets/github-logo.png" alt="github logo image">
            </div>
            <div class="content text-center">
                <h1 class=" text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h1>
                <p class="text-[#64748B]">Sign in to manage your issues</p>

            </div>

        </div>

        <div class="mt-6 ">
     <fieldset class="fieldset bg-base-100  rounded-box   ">
        
        <label " class="label font-medium text-[#1F2937]">Username</label>
        <input id="input-username" type="text" class="input w-full rounded-lg" placeholder="Enter Username" />

        <label class="label font-medium text-[#1F2937] ">Password</label>
        <input id="input-password" type="password" class="input w-full rounded-lg " placeholder=" Enter Password" />

        <button id="singin-btn" class="btn btn-primary mt-4 my-6">Sing in</button>
    </fieldset>

    <div class="">
     <fieldset class="fieldset bg-base-100 border-base-300 rounded-box  border p-4">
  <legend class="fieldset-legend text-center mb-6">OR</legend>
  <div class="text-center">
    <p class="text-[#64748B] text-sm mb-2">Demo Credentials:</p>
   <div class="bg-base-200 border-base-300 rounded-box  border p-6">
     <h3 class="text-[#1F2937] font-semibold">Username: admin</h3>
    <h3 class="text-[#1F2937] font-semibold">Password: admin123</h3>
   </div>
  </div>
</fieldset>
    </div>

        </div>

    </section>
    
    <script src="index.js"></script>
</body>
</html>
